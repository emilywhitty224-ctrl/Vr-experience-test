<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Royal Oak — WWII London, 1940</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script>
    /* ── Randomises light intensity: simulates Blitz-era electrical faults ── */
    AFRAME.registerComponent('blitz-flicker', {
      schema: {
        minIntensity: { default: 0.1 },
        maxIntensity: { default: 1.0 },
        chance:       { default: 0.04 }
      },
      tick: function () {
        if (Math.random() < this.data.chance) {
          const v = this.data.minIntensity +
                    Math.random() * (this.data.maxIntensity - this.data.minIntensity);
          this.el.setAttribute('light', 'intensity', v);
        }
      }
    });

    /* ── Sweeps parent entity (beam + light together) like an AA searchlight ──
       vertAngle: degrees from vertical  (0 = straight up, 90 = horizontal)
       swing:     max pan arc in degrees
       speed:     radians per second
    */
    AFRAME.registerComponent('searchlight-sweep', {
      schema: {
        vertAngle: { default: 15 },
        swing:     { default: 20 },
        speed:     { default: 0.18 }
      },
      init: function () { this.t = 0; },
      tick: function (time, dt) {
        this.t += this.data.speed * (dt / 1000);
        const v = this.data.vertAngle + Math.sin(this.t * 0.6) * 4;
        const p = Math.sin(this.t) * this.data.swing;
        this.el.setAttribute('rotation', `-${v.toFixed(2)} ${p.toFixed(2)} 0`);
      }
    });
  </script>
</head>
<body>
<a-scene
  fog="type: linear; color: #0d120d; near: 6; far: 32"
  renderer="colorManagement: true; physicallyCorrectLights: true"
  shadow="type: pcfsoft"
  background="color: #020305">

  <!-- ═══════════════════════ ASSETS ═══════════════════════ -->
  <a-assets timeout="15000">
    <!-- Pub tile PBR set -->
    <img id="pub-diff"    src="textures/The royal oak/pub_tile_diffuse.jpg">
    <img id="pub-norm"    src="textures/The royal oak/pub_tile_normal.jpg">
    <img id="pub-rough"   src="textures/The royal oak/pub_tile_roughness.jpg">
    <!-- Sandstone PBR set -->
    <img id="stone-diff"  src="textures/The royal oak/sandstone_diffuse.jpg">
    <img id="stone-ao"    src="textures/The royal oak/sandstone_ao.jpg">
    <img id="stone-rough" src="textures/The royal oak/Sandstone_Rough.jpg">
    <!-- Street PBR set -->
    <img id="road-diff"   src="textures/The royal oak/street_diffuse.jpg">
    <img id="road-norm"   src="textures/The royal oak/street_normal.jpg">
    <img id="road-rough"  src="textures/The royal oak/street_roughness.jpg">
    <!-- GLB models -->
    <a-asset-item id="lamp-glb"    src="textures/The royal oak/Streetlamp.glb"></a-asset-item>
    <a-asset-item id="bike-glb"    src="textures/The royal oak/Bike.glb"></a-asset-item>
    <a-asset-item id="postbox-glb" src="textures/The royal oak/Postbox.glb"></a-asset-item>
    <!-- Audio -->
    <audio id="blitz-snd" src="textures/The royal oak/blitz.mp3" preload="auto"></audio>
    <audio id="vera-snd"  src="textures/The royal oak/vera.mp3"  preload="auto"></audio>
  </a-assets>

  <!-- ═══════════════════════ AUDIO ═══════════════════════ -->
  <!-- Blitz ambient loop — non-positional, full surround -->
  <a-entity sound="src: #blitz-snd; autoplay: true; loop: true; volume: 0.7; positional: false">
  </a-entity>
  <!-- Vera Lynn drifting from inside the pub -->
  <a-entity position="5 1.5 -14"
    sound="src: #vera-snd; autoplay: true; loop: true; volume: 0.5;
           rolloffFactor: 2.5; maxDistance: 18; positional: true">
  </a-entity>

  <!-- ═══════════════════════ LIGHTING ═══════════════════════ -->
  <!-- Blackout London: near-total darkness -->
  <a-light type="ambient"     color="#141e14" intensity="0.2"></a-light>
  <a-light type="directional" color="#1a2a3a" intensity="0.18"
           position="-4 10 3" cast-shadow="true">
  </a-light>

  <!-- ═══════════════════════ L-JUNCTION STREET ═══════════════════════ -->
  <!--
    Layout (bird's-eye, player at origin looking toward -Z):

      Main street (N-S):   X[-4,  4],  Z[ 2, -24]
      Side street (E-W):   X[ 4, 22],  Z[-9, -17]
      Inner corner:        (4, 0, -9)   pub entrance corner

    PBR repeat values are high for fine road-tile detail.
  -->

  <!-- North-south carriageway -->
  <a-plane
    position="0 0 -11"
    rotation="-90 0 0"
    width="8" height="26"
    material="src: #road-diff; normalMap: #road-norm; roughnessMap: #road-rough;
              repeat: 5 16; roughness: 0.85; metalness: 0">
  </a-plane>

  <!-- East-west branch carriageway -->
  <a-plane
    position="13 0 -13"
    rotation="-90 0 0"
    width="18" height="8"
    material="src: #road-diff; normalMap: #road-norm; roughnessMap: #road-rough;
              repeat: 11 5; roughness: 0.85; metalness: 0">
  </a-plane>

  <!-- Raised kerb strips (slightly proud of road surface) -->
  <a-box position="4.35 0.09 -4.5"  width="0.7"  height="0.18" depth="9"   color="#3c3c37"></a-box>
  <a-box position="12.5 0.09 -8.65" width="15"   height="0.18" depth="0.7" color="#3c3c37"></a-box>

  <!-- ═══════════════════════ THE ROYAL OAK ═══════════════════════ -->
  <!--
    Pub occupies X[4.125, 20.25], Z[-9.125, -21.25]

    West facade outer face at X=4.0,  spans Z[-10, -21]  (length 11 m)
    South facade outer face at Z=-9.0, spans X[5, 20]    (length 15 m)

    45° bevel corner connects (4,y,-10) to (5,y,-9):
      Outer face centre: (4.5, y, -9.5)
      Box centre (0.125 m inward along local X): (4.588, y, -9.588)
      Box rotation: (0, 45, 0) — local Z extends along world (0.707, 0, 0.707) = bevel direction

    Facade layering (all three faces):
      0.0–1.2 m  green gloss pub tiles  (pub_tile_ PBR)
      1.2–5.0 m  sandstone masonry      (sandstone_ PBR)
      5.0 m      protruding fascia      (sandstone_ PBR)
  -->

  <!-- ─── West facade ──────────────────────────────────────── -->

  <!-- Green gloss tile strip (0–1.2 m) -->
  <a-box position="4.125 0.6 -15.5" width="0.25" height="1.2" depth="11"
         material="src: #pub-diff; normalMap: #pub-norm; roughnessMap: #pub-rough;
                   color: #2a5018; repeat: 11 1; roughness: 0.18; metalness: 0.07">
  </a-box>
  <!-- Sandstone masonry (1.2–5 m) -->
  <a-box position="4.125 3.1 -15.5" width="0.25" height="3.8" depth="11"
         material="src: #stone-diff; aoMap: #stone-ao; roughnessMap: #stone-rough;
                   repeat: 5.5 2; roughness: 0.88; metalness: 0">
  </a-box>

  <!-- Four leaded-glass panes (blacked out) -->
  <a-box position="3.95 2.2 -12"  width="0.14" height="1.5" depth="1.3" color="#0b1b0b"></a-box>
  <a-box position="3.95 2.2 -14"  width="0.14" height="1.5" depth="1.3" color="#0b1b0b"></a-box>
  <a-box position="3.95 2.2 -17"  width="0.14" height="1.5" depth="1.3" color="#0b1b0b"></a-box>
  <a-box position="3.95 2.2 -19"  width="0.14" height="1.5" depth="1.3" color="#0b1b0b"></a-box>
  <!-- Stone window surrounds -->
  <a-box position="3.90 2.2 -12"  width="0.1" height="1.8" depth="1.6" color="#5a5040"></a-box>
  <a-box position="3.90 2.2 -14"  width="0.1" height="1.8" depth="1.6" color="#5a5040"></a-box>
  <a-box position="3.90 2.2 -17"  width="0.1" height="1.8" depth="1.6" color="#5a5040"></a-box>
  <a-box position="3.90 2.2 -19"  width="0.1" height="1.8" depth="1.6" color="#5a5040"></a-box>
  <!-- Warm amber bleed past blackout curtains -->
  <a-light type="point" color="#4a2a00" intensity="0.55" distance="4" position="4.6 2.2 -15.5">
  </a-light>

  <!-- ─── South facade ─────────────────────────────────────── -->

  <!-- Green gloss tile strip -->
  <a-box position="12.5 0.6 -9.125" width="15" height="1.2" depth="0.25"
         material="src: #pub-diff; normalMap: #pub-norm; roughnessMap: #pub-rough;
                   color: #2a5018; repeat: 15 1; roughness: 0.18; metalness: 0.07">
  </a-box>
  <!-- Stone upper -->
  <a-box position="12.5 3.1 -9.125" width="15" height="3.8" depth="0.25"
         material="src: #stone-diff; aoMap: #stone-ao; roughnessMap: #stone-rough;
                   repeat: 7.5 2; roughness: 0.88; metalness: 0">
  </a-box>
  <!-- Windows -->
  <a-box position="8  2.2 -9.06" width="1.3" height="1.5" depth="0.14" color="#0b1b0b"></a-box>
  <a-box position="11 2.2 -9.06" width="1.3" height="1.5" depth="0.14" color="#0b1b0b"></a-box>
  <a-box position="15 2.2 -9.06" width="1.3" height="1.5" depth="0.14" color="#0b1b0b"></a-box>

  <!-- ─── 45° Bevel corner ──────────────────────────────────── -->
  <!--
    Door opening: 0.8 m wide, centred on outer face (4.5, y, -9.5).
    Remaining: (1.414 - 0.8) / 2 = 0.307 m each side.

    Section outer-face centres  →  box centres (0.088 m inward):
      Left  (4.109, y, -9.891)  →  (4.197, y, -9.979)
      Right (4.891, y, -9.109)  →  (4.979, y, -9.197)
      Door  (4.5,   y, -9.5)    →  (4.588, y, -9.588)
  -->

  <!-- Bevel left — tile -->
  <a-box position="4.197 0.6 -9.979"  width="0.25" height="1.2" depth="0.307" rotation="0 45 0"
         material="src: #pub-diff; normalMap: #pub-norm; roughnessMap: #pub-rough;
                   color: #2a5018; repeat: 0.3 1; roughness: 0.18; metalness: 0.07">
  </a-box>
  <!-- Bevel left — stone -->
  <a-box position="4.197 3.1 -9.979"  width="0.25" height="3.8" depth="0.307" rotation="0 45 0"
         material="src: #stone-diff; aoMap: #stone-ao; roughnessMap: #stone-rough;
                   repeat: 0.2 2; roughness: 0.88; metalness: 0">
  </a-box>

  <!-- Bevel right — tile -->
  <a-box position="4.979 0.6 -9.197"  width="0.25" height="1.2" depth="0.307" rotation="0 45 0"
         material="src: #pub-diff; normalMap: #pub-norm; roughnessMap: #pub-rough;
                   color: #2a5018; repeat: 0.3 1; roughness: 0.18; metalness: 0.07">
  </a-box>
  <!-- Bevel right — stone -->
  <a-box position="4.979 3.1 -9.197"  width="0.25" height="3.8" depth="0.307" rotation="0 45 0"
         material="src: #stone-diff; aoMap: #stone-ao; roughnessMap: #stone-rough;
                   repeat: 0.2 2; roughness: 0.88; metalness: 0">
  </a-box>

  <!-- Stone above door (lintel to roofline: 2.4–5 m = 2.6 m tall) -->
  <a-box position="4.588 3.7 -9.588"  width="0.25" height="2.6" depth="0.82" rotation="0 45 0"
         material="src: #stone-diff; aoMap: #stone-ao; roughnessMap: #stone-rough;
                   repeat: 0.55 1.3; roughness: 0.88; metalness: 0">
  </a-box>

  <!-- Stone lintel slab over door opening -->
  <a-box position="4.588 2.45 -9.588" width="0.32" height="0.12" depth="0.88" rotation="0 45 0"
         color="#4a4030">
  </a-box>

  <!--
    Door recess — 0.5 m deep into the building.
    Inward direction = local +X with rotation (0,45,0) = world (0.707, 0, -0.707).
    0.5 m inward from outer face (4.5,y,-9.5) → door-back at (4.854,y,-9.854).

    Jamb centres (at recess mid-depth = 0.25 m inward from door-edge outer face):
      Left  edge outer (4.217,y,-9.783)  → jamb centre (4.394,y,-9.960)
      Right edge outer (4.783,y,-9.217)  → jamb centre (4.960,y,-9.394)
  -->
  <!-- Left door jamb -->
  <a-box position="4.394 1.2 -9.960"  width="0.5" height="2.4" depth="0.07" rotation="0 45 0"
         color="#070d07">
  </a-box>
  <!-- Right door jamb -->
  <a-box position="4.960 1.2 -9.394"  width="0.5" height="2.4" depth="0.07" rotation="0 45 0"
         color="#070d07">
  </a-box>
  <!-- Recess ceiling -->
  <a-box position="4.588 2.4 -9.588"  width="0.5"  height="0.08" depth="0.8"  rotation="0 45 0"
         color="#070d07">
  </a-box>
  <!-- Door panel (dark painted wood) at back of recess -->
  <a-box position="4.854 1.1 -9.854"  width="0.1"  height="2.2"  depth="0.76" rotation="0 45 0"
         color="#1a2810">
  </a-box>
  <!-- Worn sandstone doorstep -->
  <a-box position="4.5 0.06 -9.5"     width="0.6"  height="0.12" depth="0.88" rotation="0 45 0"
         color="#3a3028">
  </a-box>

  <!-- ─── Roofline fascia — protruding stone board, three sections ── -->
  <!-- West -->
  <a-box position="3.975 5.225 -15.5"  width="0.5" height="0.45" depth="11.5"
         material="src: #stone-diff; aoMap: #stone-ao; roughnessMap: #stone-rough;
                   repeat: 5.5 0.3; roughness: 0.85; metalness: 0">
  </a-box>
  <!-- South -->
  <a-box position="12.5 5.225 -8.975"  width="15.5" height="0.45" depth="0.5"
         material="src: #stone-diff; aoMap: #stone-ao; roughnessMap: #stone-rough;
                   repeat: 7.5 0.3; roughness: 0.85; metalness: 0">
  </a-box>
  <!-- Bevel -->
  <a-box position="4.588 5.225 -9.588" width="0.5" height="0.45" depth="1.5" rotation="0 45 0"
         material="src: #stone-diff; aoMap: #stone-ao; roughnessMap: #stone-rough;
                   repeat: 1 0.3; roughness: 0.85; metalness: 0">
  </a-box>

  <!-- ─── Pub sign (green painted board on west fascia) ─────── -->
  <a-box position="3.84 4.55 -14" width="0.07" height="0.6" depth="5.5" color="#1b3b0a"></a-box>
  <a-text value="THE ROYAL OAK"
          position="3.77 4.55 -14"
          rotation="0 -90 0"
          color="#c8a028"
          width="5"
          align="center">
  </a-text>

  <!-- ─── Building shell (roof, back walls, interior solid) ──── -->
  <!-- Flat roof slab -->
  <a-box position="12.5 5.45 -15.125"  width="16.5" height="0.22" depth="12.5" color="#141612">
  </a-box>
  <!-- North (far) wall -->
  <a-box position="12.5 2.5 -21.25"    width="16"    height="5"    depth="0.25" color="#1a1a18">
  </a-box>
  <!-- East wall -->
  <a-box position="20.25 2.5 -15.125"  width="0.25"  height="5"    depth="12.5" color="#1a1a18">
  </a-box>
  <!-- Interior solid fill — prevents see-through -->
  <a-box position="12.5 2.5 -15.125"   width="15.75" height="4.8"  depth="11.9" color="#0d0e0c">
  </a-box>

  <!-- ═══════════════════════ STREETLAMP ═══════════════════════ -->
  <!-- Scale 50 50 50 per spec; lamp head ~7 m up at this scale -->
  <a-entity gltf-model="#lamp-glb" position="3.8 0 -8.5" scale="50 50 50"></a-entity>
  <a-light type="point" color="#ffaa55" intensity="0.95" distance="14" decay="2"
           position="3.8 7 -8.5"
           blitz-flicker="minIntensity: 0.4; maxIntensity: 1.05; chance: 0.015">
  </a-light>

  <!-- ═══════════════════════ SEARCHLIGHTS ═══════════════════════ -->
  <!--
    Each searchlight is one entity rotated by searchlight-sweep.
    Beam cone:   radius-bottom=narrow (source end), radius-top=wide (sky end).
    Spot light:  rotation="180 0 0" flips from default -Y to local +Y (skyward).
    Both cylinder and light rotate together with the parent entity.
  -->

  <!-- Searchlight 1 — west rear -->
  <a-entity position="-3.2 0 -20"
            searchlight-sweep="vertAngle: 14; swing: 22; speed: 0.16">
    <a-cylinder radius="0.32" height="0.32" color="#252520" position="0 0.16 0"></a-cylinder>
    <a-cylinder radius="0.34" height="0.20" color="#1c1c18" position="0 0.42 0"></a-cylinder>
    <!-- Volumetric beam — narrow at lamp, widens toward sky -->
    <a-cylinder
      radius-bottom="0.07" radius-top="0.65" height="28"
      position="0 14.5 0"
      color="#90aeff" opacity="0.055"
      material="transparent: true; side: double; depthWrite: false">
    </a-cylinder>
    <a-light type="spot" color="#c0d4ff" intensity="2.2" angle="7" penumbra="0.4"
             position="0 0.5 0" rotation="180 0 0"
             blitz-flicker="minIntensity: 1.0; maxIntensity: 2.8; chance: 0.035">
    </a-light>
  </a-entity>

  <!-- Searchlight 2 — east rear -->
  <a-entity position="11 0 -26"
            searchlight-sweep="vertAngle: 12; swing: 28; speed: 0.22">
    <a-cylinder radius="0.32" height="0.32" color="#252520" position="0 0.16 0"></a-cylinder>
    <a-cylinder radius="0.34" height="0.20" color="#1c1c18" position="0 0.42 0"></a-cylinder>
    <a-cylinder
      radius-bottom="0.07" radius-top="0.65" height="28"
      position="0 14.5 0"
      color="#90aeff" opacity="0.055"
      material="transparent: true; side: double; depthWrite: false">
    </a-cylinder>
    <a-light type="spot" color="#c0d4ff" intensity="2.2" angle="7" penumbra="0.4"
             position="0 0.5 0" rotation="180 0 0"
             blitz-flicker="minIntensity: 1.0; maxIntensity: 2.8; chance: 0.028">
    </a-light>
  </a-entity>

  <!-- ═══════════════════════ PROPS ═══════════════════════ -->
  <a-entity gltf-model="#postbox-glb" position="5.2 0 -10.8" rotation="0 180 0" scale="1 1 1">
  </a-entity>
  <a-entity gltf-model="#bike-glb"    position="4.3 0 -18.5"  rotation="0 170 0" scale="1 1 1">
  </a-entity>

  <!-- ═══════════════════════ BACKGROUND BUILDINGS ═══════════════════════ -->
  <!-- West terrace row — opposite side of main street -->
  <a-box position="-5.5 3.5 -10"
         material="src: #stone-diff; color: #888070; repeat: 4 3; roughness: 0.9; metalness: 0"
         width="1" height="7" depth="12">
  </a-box>
  <a-box position="-6.5 3 -6"
         material="src: #stone-diff; color: #7a7060; repeat: 3 2.5; roughness: 0.9; metalness: 0"
         width="1" height="6" depth="6">
  </a-box>
  <a-box position="-5.8 4 -18"
         material="src: #stone-diff; color: #6e6858; repeat: 3.5 3; roughness: 0.9; metalness: 0"
         width="1" height="8" depth="12">
  </a-box>
  <!-- Dark unlit windows on terrace -->
  <a-box position="-5.05 3   -8"  width="0.12" height="1.2" depth="0.9" color="#080d08"></a-box>
  <a-box position="-5.05 3   -12" width="0.12" height="1.2" depth="0.9" color="#080d08"></a-box>
  <a-box position="-5.05 4.2 -16" width="0.12" height="1.2" depth="0.9" color="#080d08"></a-box>
  <a-box position="-5.05 4.2 -20" width="0.12" height="1.2" depth="0.9" color="#080d08"></a-box>

  <!-- Road-end blocker buildings -->
  <a-box position="0 4 -26"
         material="src: #stone-diff; color: #60584e; repeat: 4 3; roughness: 0.9; metalness: 0"
         width="10" height="8" depth="1">
  </a-box>
  <a-box position="22.5 3.5 -13"
         material="src: #stone-diff; color: #60584e; repeat: 2 3; roughness: 0.9; metalness: 0"
         width="1" height="7" depth="9">
  </a-box>

  <!-- ═══════════════════════ SKY ═══════════════════════ -->
  <a-sky color="#020305"></a-sky>

  <!-- ═══════════════════════ PLAYER RIG ═══════════════════════ -->
  <!-- WASD + mouse-look on desktop; headset tracking in WebXR -->
  <a-entity id="rig" position="0 0 2">
    <a-entity camera look-controls wasd-controls="acceleration: 20" position="0 1.6 0">
    </a-entity>
  </a-entity>

</a-scene>
</body>
</html>
