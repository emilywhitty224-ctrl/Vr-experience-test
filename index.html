<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WWII Blackout Street - The Royal Oak</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>
  <style>
    #enter-vr-btn {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      padding: 16px 40px;
      font-size: 20px;
      font-family: Arial, sans-serif;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #fff;
      background: #b8860b;
      border: 3px solid #fff;
      border-radius: 6px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(184, 134, 11, 0.8);
    }
    #enter-vr-btn:hover {
      background: #d4a017;
      box-shadow: 0 0 30px rgba(212, 160, 23, 1);
    }
  </style>

  <a-scene fog="type: linear; color: #0a0a1a; near: 12; far: 28">

    <!-- Sky: very dark navy blue -->
    <a-sky color="#0a0a1a"></a-sky>

    <!-- ========== LIGHTING ========== -->
    <!-- Ambient: enough to clearly see details without losing night atmosphere -->
    <a-light type="ambient" color="#1c2444" intensity="1.6"></a-light>
    <!-- Soft fill from above to define rooflines -->
    <a-light type="directional" color="#1a1a3a" intensity="0.5" position="0 10 -5"></a-light>

    <!-- Flickering warm pub door light -->
    <a-light
      type="point"
      color="#b8860b"
      intensity="0.9"
      distance="5"
      position="-2.65 0.15 -3.5"
      animation="property: light.intensity; from: 0.5; to: 1.3; dur: 200; dir: alternate; loop: true; easing: easeInOutSine">
    </a-light>

    <!-- ========== STREET & PAVEMENTS ========== -->

    <!-- Cobblestone street: 4m wide, 13m long, dark rough grey -->
    <a-plane
      position="0 0 -6"
      rotation="-90 0 0"
      width="4"
      height="13"
      color="#2a2724">
    </a-plane>

    <!-- Left pavement (raised kerb) -->
    <a-box
      position="-2.4 0.08 -6"
      width="0.8"
      height="0.16"
      depth="13"
      color="#3a3835">
    </a-box>

    <!-- Right pavement (raised kerb) -->
    <a-box
      position="2.4 0.08 -6"
      width="0.8"
      height="0.16"
      depth="13"
      color="#3a3835">
    </a-box>

    <!-- ========== LEFT SIDE BUILDINGS ========== -->

    <!-- The Royal Oak pub: dark red, 5.5m tall -->
    <a-box
      position="-3.3 2.75 -3"
      width="1.2"
      height="5.5"
      depth="6"
      color="#3b1010">
    </a-box>
    <!-- Pub roofline cap -->
    <a-box
      position="-3.3 5.7 -3"
      width="1.22"
      height="0.4"
      depth="6.2"
      color="#2a0b0b">
    </a-box>

    <!-- Building 2: dark brown, slightly taller -->
    <a-box
      position="-3.3 3.0 -8"
      width="1.2"
      height="6.0"
      depth="5"
      color="#2b1a0a">
    </a-box>
    <a-box
      position="-3.3 6.1 -8"
      width="1.22"
      height="0.3"
      depth="5.2"
      color="#1e1207">
    </a-box>

    <!-- Building 3: dark red, shorter -->
    <a-box
      position="-3.3 2.25 -11.5"
      width="1.2"
      height="4.5"
      depth="3"
      color="#3b1010">
    </a-box>

    <!-- ========== RIGHT SIDE BUILDINGS ========== -->

    <!-- Building 4: dark brown, tallest -->
    <a-box
      position="3.3 3.0 -3.5"
      width="1.2"
      height="6.0"
      depth="6"
      color="#2b1a0a">
    </a-box>
    <a-box
      position="3.3 6.1 -3.5"
      width="1.22"
      height="0.3"
      depth="6.2"
      color="#1e1207">
    </a-box>

    <!-- Building 5: dark red -->
    <a-box
      position="3.3 2.75 -8"
      width="1.2"
      height="5.5"
      depth="5"
      color="#3b1010">
    </a-box>
    <a-box
      position="3.3 5.7 -8"
      width="1.22"
      height="0.4"
      depth="5.2"
      color="#2a0b0b">
    </a-box>

    <!-- Building 6: dark brown, shorter -->
    <a-box
      position="3.3 2.5 -11.5"
      width="1.2"
      height="5.0"
      depth="3"
      color="#2b1a0a">
    </a-box>

    <!-- ========== WINDOWS - LEFT BUILDINGS ========== -->

    <!-- Pub ground floor windows (blackout curtains) -->
    <a-box position="-2.68 1.5 -1.8" width="0.04" height="1.0" depth="0.9" color="#0d0a0a"></a-box>
    <a-box position="-2.68 1.5 -3.2" width="0.04" height="1.0" depth="0.9" color="#0d0a0a"></a-box>
    <!-- Pub upper floor windows (blackout curtains) -->
    <a-box position="-2.68 3.6 -1.8" width="0.04" height="1.0" depth="0.9" color="#0d0a0a"></a-box>
    <a-box position="-2.68 3.6 -3.2" width="0.04" height="1.0" depth="0.9" color="#0d0a0a"></a-box>
    <!-- Tiny glowing yellow gap: light leaking through blackout curtain above pub -->
    <a-box
      position="-2.67 3.1 -1.8"
      width="0.04"
      height="0.04"
      depth="0.75"
      material="color: #d4a017; emissive: #d4a017; emissiveIntensity: 1.5">
    </a-box>

    <!-- Building 2 windows -->
    <a-box position="-2.68 2.0 -7.0" width="0.04" height="1.0" depth="0.9" color="#0d0a0a"></a-box>
    <a-box position="-2.68 2.0 -8.5" width="0.04" height="1.0" depth="0.9" color="#0d0a0a"></a-box>
    <a-box position="-2.68 4.3 -7.0" width="0.04" height="1.0" depth="0.9" color="#0d0a0a"></a-box>
    <a-box position="-2.68 4.3 -8.5" width="0.04" height="1.0" depth="0.9" color="#0d0a0a"></a-box>

    <!-- ========== WINDOWS - RIGHT BUILDINGS ========== -->

    <!-- Building 4 -->
    <a-box position="2.68 2.0 -2.5" width="0.04" height="1.0" depth="0.9" color="#0d0a0a"></a-box>
    <a-box position="2.68 2.0 -4.5" width="0.04" height="1.0" depth="0.9" color="#0d0a0a"></a-box>
    <a-box position="2.68 4.3 -2.5" width="0.04" height="1.0" depth="0.9" color="#0d0a0a"></a-box>
    <a-box position="2.68 4.3 -4.5" width="0.04" height="1.0" depth="0.9" color="#0d0a0a"></a-box>
    <!-- Building 5 -->
    <a-box position="2.68 2.5 -7.0" width="0.04" height="1.0" depth="0.9" color="#0d0a0a"></a-box>
    <a-box position="2.68 2.5 -8.5" width="0.04" height="1.0" depth="0.9" color="#0d0a0a"></a-box>
    <a-box position="2.68 4.5 -7.5" width="0.04" height="1.0" depth="0.9" color="#0d0a0a"></a-box>

    <!-- ========== PUB DETAILS ========== -->

    <!-- Pub door: tall dark brown, 2m high -->
    <a-box
      position="-2.68 1.0 -3.5"
      width="0.04"
      height="2.0"
      depth="0.75"
      color="#3d1f00">
    </a-box>
    <!-- Door frame surround -->
    <a-box
      position="-2.67 1.0 -3.5"
      width="0.03"
      height="2.12"
      depth="0.88"
      color="#2a1500">
    </a-box>

    <!-- Hanging pub sign board -->
    <a-box
      position="-2.5 2.85 -2.8"
      width="0.08"
      height="0.48"
      depth="1.4"
      color="#4a2800">
    </a-box>
    <!-- Sign bracket arm -->
    <a-box
      position="-2.65 3.12 -2.8"
      width="0.04"
      height="0.6"
      depth="0.05"
      color="#2a1500">
    </a-box>
    <!-- Sign text -->
    <a-text
      value="The Royal Oak"
      position="-2.44 2.85 -2.8"
      rotation="0 90 0"
      color="#d4a017"
      width="1.5"
      align="center">
    </a-text>

    <!-- Sandbags stacked organically at knee height around pub door -->
    <!-- Bottom row -->
    <a-box position="-2.62 0.12 -4.4" width="0.14" height="0.23" depth="0.44" color="#5c4a1e"></a-box>
    <a-box position="-2.62 0.12 -4.82" width="0.14" height="0.23" depth="0.44" color="#4e3e18"></a-box>
    <a-box position="-2.62 0.12 -5.2" width="0.13" height="0.22" depth="0.40" color="#5c4a1e"></a-box>
    <!-- Second row (offset) -->
    <a-box position="-2.61 0.35 -4.6" width="0.13" height="0.22" depth="0.44" color="#4e3e18"></a-box>
    <a-box position="-2.61 0.35 -5.0" width="0.13" height="0.22" depth="0.42" color="#5c4a1e"></a-box>
    <!-- Top single bag -->
    <a-box position="-2.60 0.57 -4.8" width="0.12" height="0.20" depth="0.38" color="#4e3e18"></a-box>

    <!-- ========== HISTORICAL PROPS ========== -->

    <!-- Pillar box (postbox): dark red cylinder on right pavement -->
    <a-cylinder
      position="2.2 0.86 -5.0"
      radius="0.2"
      height="1.4"
      color="#6b0000">
    </a-cylinder>
    <!-- Postbox crown cap: pale yellow -->
    <a-cylinder
      position="2.2 1.61 -5.0"
      radius="0.21"
      height="0.1"
      color="#d4a017">
    </a-cylinder>

    <!-- Victorian streetlamp (completely unlit) on left pavement -->
    <!-- Lamp pole -->
    <a-cylinder
      position="-2.2 1.66 -8.0"
      radius="0.04"
      height="3.32"
      color="#2a2a2a">
    </a-cylinder>
    <!-- Lamp arm extending toward street -->
    <a-box
      position="-2.05 3.2 -8.0"
      width="0.32"
      height="0.04"
      depth="0.04"
      color="#2a2a2a">
    </a-box>
    <!-- Lamp head -->
    <a-box
      position="-1.88 3.12 -8.0"
      width="0.2"
      height="0.25"
      depth="0.2"
      color="#2a2a2a">
    </a-box>

    <!-- Vintage bicycle leaning against right wall -->
    <!-- Back wheel -->
    <a-cylinder
      position="2.55 0.3 -7.8"
      radius="0.28"
      height="0.05"
      color="#1a1a1a"
      rotation="0 0 90">
    </a-cylinder>
    <!-- Front wheel -->
    <a-cylinder
      position="2.55 0.3 -7.0"
      radius="0.28"
      height="0.05"
      color="#1a1a1a"
      rotation="0 0 90">
    </a-cylinder>
    <!-- Top tube (frame) -->
    <a-box
      position="2.58 0.68 -7.4"
      width="0.05"
      height="0.04"
      depth="0.85"
      color="#222222"
      rotation="0 0 4">
    </a-box>
    <!-- Down tube -->
    <a-box
      position="2.56 0.46 -7.15"
      width="0.04"
      height="0.55"
      depth="0.5"
      color="#222222"
      rotation="15 0 4">
    </a-box>
    <!-- Seat post -->
    <a-box
      position="2.58 0.9 -7.75"
      width="0.04"
      height="0.42"
      depth="0.04"
      color="#222222">
    </a-box>
    <!-- Handlebars -->
    <a-box
      position="2.56 0.95 -7.0"
      width="0.04"
      height="0.04"
      depth="0.32"
      color="#333333">
    </a-box>

    <!-- ========== SEARCHLIGHTS IN THE SKY ========== -->

    <!-- Searchlight 1: sweeps left to right -->
    <a-cone
      position="-3 10 -14"
      radius-bottom="0.2"
      radius-top="7"
      height="20"
      material="color: #c8c8ff; transparent: true; opacity: 0.09; side: double"
      animation="property: rotation; from: 0 0 -22; to: 0 0 22; dur: 7000; dir: alternate; loop: true; easing: easeInOutSine">
    </a-cone>

    <!-- Searchlight 2: offset timing, sweeps opposite direction -->
    <a-cone
      position="4 10 -11"
      radius-bottom="0.2"
      radius-top="6"
      height="18"
      material="color: #c8c8ff; transparent: true; opacity: 0.09; side: double"
      animation="property: rotation; from: 0 0 -18; to: 0 0 20; dur: 5500; dir: alternate; loop: true; easing: easeInOutSine; delay: 2500">
    </a-cone>

    <!-- ========== POSITIONAL AUDIO at pub door ========== -->
    <a-sound
      src="vera.mp3"
      autoplay="true"
      loop="true"
      positional="true"
      rolloff-factor="2"
      max-distance="20"
      position="-2.65 1 -3.5">
    </a-sound>

    <!-- Camera / player start position -->
    <a-entity position="0 1.6 0">
      <a-camera look-controls wasd-controls></a-camera>
    </a-entity>

  </a-scene>

  <button id="enter-vr-btn">Enter VR</button>

  <script>
    document.getElementById('enter-vr-btn').addEventListener('click', function () {
      var scene = document.querySelector('a-scene');
      if (scene.is('vr-mode')) {
        scene.exitVR();
      } else {
        scene.enterVR();
      }
    });
  </script>
</body>
</html>
