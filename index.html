<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Royal Oak — WWII London, 1940</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- aframe-extras: thumbstick locomotion for Quest controllers -->
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.4.0/dist/aframe-extras.min.js"></script>
  <script>
    AFRAME.registerComponent('blitz-flicker', {
      schema: {
        minIntensity: { default: 0.1 },
        maxIntensity: { default: 1.0 },
        chance:       { default: 0.04 }
      },
      tick: function () {
        if (Math.random() < this.data.chance) {
          const v = this.data.minIntensity +
                    Math.random() * (this.data.maxIntensity - this.data.minIntensity);
          this.el.setAttribute('light', 'intensity', v);
        }
      }
    });

    AFRAME.registerComponent('searchlight-sweep', {
      schema: {
        vertAngle: { default: 15 },
        swing:     { default: 20 },
        speed:     { default: 0.18 }
      },
      init: function () { this.t = 0; },
      tick: function (time, dt) {
        this.t += this.data.speed * (dt / 1000);
        const v = this.data.vertAngle + Math.sin(this.t * 0.6) * 4;
        const p = Math.sin(this.t) * this.data.swing;
        this.el.setAttribute('rotation', `${v.toFixed(2)} ${p.toFixed(2)} 0`);
      }
    });

    AFRAME.registerComponent('blast-tape', {
      init: function () {
        const isWest = this.el.components['war-window'] &&
                       this.el.components['war-window'].data.wall === 'west';
        [1, -1].forEach(function (sign) {
          const t = document.createElement('a-box');
          t.setAttribute('color', '#d4c06a');
          if (isWest) {
            t.setAttribute('position', '0.09 0 0');
            t.setAttribute('rotation', (sign * 45) + ' 0 0');
            t.setAttribute('width',  '0.02');
            t.setAttribute('height', '2.8');
            t.setAttribute('depth',  '0.07');
          } else {
            t.setAttribute('position', '0 0 -0.09');
            t.setAttribute('rotation', '0 0 ' + (sign * 45));
            t.setAttribute('width',  '0.07');
            t.setAttribute('height', '2.8');
            t.setAttribute('depth',  '0.02');
          }
          this.el.appendChild(t);
        }, this);
      }
    });

    AFRAME.registerComponent('war-window', {
      schema: { wall: { default: 'west' } },
      init: function () {
        const isWest = this.data.wall === 'west';
        const el = this.el;
        function box(pos, w, h, d, mat) {
          const b = document.createElement('a-box');
          b.setAttribute('position', pos);
          b.setAttribute('width',  String(w));
          b.setAttribute('height', String(h));
          b.setAttribute('depth',  String(d));
          if (mat[0] === '#') { b.setAttribute('color', mat); }
          else                { b.setAttribute('material', mat); }
          el.appendChild(b);
        }
        const glass = 'transparent: true; opacity: 0.6; metalness: 0.7; roughness: 0.08; color: #0d1810';
        if (isWest) {
          box('0.01 0 0',      0.16, 2.4, 1.7,  '#c8b882');
          box('0.10 0 0',      0.1,  2.2, 1.5,  glass);
          box('0.05 0.4 0',    0.12, 0.1, 1.48, '#2a1f0f');
          box('0.05 0 -0.5',   0.12, 2.2, 0.07, '#2a1f0f');
          box('0.05 0 0.5',    0.12, 2.2, 0.07, '#2a1f0f');
          box('-0.03 -1.15 0', 0.22, 0.1, 1.8,  '#c8b882');
        } else {
          box('0 0 0.01',      1.7,  2.4, 0.16, '#c8b882');
          box('0 0 -0.10',     1.5,  2.2, 0.1,  glass);
          box('0 0.4 -0.04',   1.48, 0.1, 0.12, '#2a1f0f');
          box('-0.5 0 -0.04',  0.07, 2.2, 0.12, '#2a1f0f');
          box('0.5 0 -0.04',   0.07, 2.2, 0.12, '#2a1f0f');
          box('0 -1.15 0.05',  1.8,  0.1, 0.22, '#c8b882');
        }
        el.setAttribute('blast-tape', '');
      }
    });
  </script>
</head>
<body>
<a-scene
  fog="type: linear; color: #c8d8e8; near: 50; far: 120"
  renderer="colorManagement: true"
  shadow="type: pcfsoft"
  background="color: #6ba3d0">

  <!-- ═══════════════════════ ASSETS ═══════════════════════ -->
  <a-assets timeout="15000">
    <img id="pub-diff"    src="textures/The royal oak/pub_tile_diffuse.jpg">
    <img id="pub-norm"    src="textures/The royal oak/pub_tile_normal.jpg">
    <img id="pub-rough"   src="textures/The royal oak/pub_tile_roughness.jpg">
    <img id="stone-diff"  src="textures/The royal oak/sandstone_diffuse.jpg">
    <img id="stone-ao"    src="textures/The royal oak/sandstone_ao.jpg">
    <img id="stone-rough" src="textures/The royal oak/Sandstone_Rough.jpg">
    <img id="road-diff"   src="textures/The royal oak/street_diffuse.jpg">
    <img id="road-norm"   src="textures/The royal oak/street_normal.jpg">
    <img id="road-rough"  src="textures/The royal oak/street_roughness.jpg">
    <img id="brick-diff"  src="textures/The royal oak/brown_brick_diffuse.jpg">
    <img id="brick-norm"  src="textures/The royal oak/brown_brick_normal.jpg">
    <img id="brick-rough" src="textures/The royal oak/brown_brick_roughness.jpg">
    <img id="brick-ao"    src="textures/The royal oak/brown_brick_ao.jpg">
    <audio id="blitz-snd" src="textures/The royal oak/blitz.mp3" preload="auto"></audio>
    <audio id="vera-snd"  src="textures/The royal oak/vera.mp3"  preload="auto"></audio>
  </a-assets>

  <!-- ═══════════════════════ AUDIO ═══════════════════════ -->
  <a-entity sound="src: #blitz-snd; autoplay: true; loop: true; volume: 0.7; positional: false"></a-entity>
  <a-entity position="5 2 -14"
    sound="src: #vera-snd; autoplay: true; loop: true; volume: 0.5;
           rolloffFactor: 2.5; maxDistance: 18; positional: true">
  </a-entity>

  <!-- ═══════════════════════ DAYTIME LIGHTING ═══════════════════════ -->
  <a-light type="ambient"     color="#d0d8e0" intensity="1.4"></a-light>
  <a-light type="directional" color="#fff8e8" intensity="1.6"
           position="-8 20 5" cast-shadow="true">
  </a-light>

  <!-- ═══════════════════════ STREET ═══════════════════════ -->
  <!-- Single master ground plane — eliminates seams -->
  <a-plane position="9 0.001 -12" rotation="-90 0 0" width="40" height="36"
    material="src: #road-diff; normalMap: #road-norm; roughnessMap: #road-rough;
              repeat: 20 20; roughness: 0.85; metalness: 0">
  </a-plane>

  <!-- ── PAVEMENT ── -->
  <a-plane position="3.4 0.15 -15.5"  rotation="-90 0 0" width="1.2" height="12"
           material="color: #585855; roughness: 0.95; metalness: 0">
  </a-plane>
  <a-plane position="13.0 0.15 -8.4"  rotation="-90 0 0" width="16" height="1.2"
           material="color: #585855; roughness: 0.95; metalness: 0">
  </a-plane>
  <a-plane position="3.9 0.15 -8.65"  rotation="-90 0 0" width="2.2" height="1.7"
           material="color: #585855; roughness: 0.95; metalness: 0">
  </a-plane>

  <!-- ── GRANITE CURB STONES ── -->
  <!-- West kerb — full run from far end to corner -->
  <a-box position="2.8 0.075 -15.5"
         width="0.12" height="0.15" depth="12"
         color="#404040">
  </a-box>
  <!-- West kerb extension — gap between main run and south kerb corner -->
  <a-box position="2.8 0.075 -8.65"
         width="0.12" height="0.15" depth="1.7"
         color="#404040">
  </a-box>
  <!-- South kerb -->
  <a-box position="11.9 0.075 -7.8"
         width="18.2" height="0.15" depth="0.12"
         color="#404040">
  </a-box>
  <!-- Diagonal kerb in front of door bevel -->
  <a-box position="4.588 0.075 -9.588"
         width="0.12" height="0.15" depth="1.3"
         rotation="0 45 0"
         color="#404040">
  </a-box>
  <a-box position="2.8 0.075 -7.8"
         width="0.12" height="0.15" depth="0.12"
         color="#404040">
  </a-box>

  <!-- ═══════════════════════════════════════════════════════════════════════
       THE ROYAL OAK — 10 m TALL, 3-STOREY

       Layer 1  Green tile   0.0 –  1.0 m   (ground floor base)
       Layer 2  Sandstone    1.0 –  3.5 m   (ground floor walls + pub sign)
       Layer 3  Brown brick  3.5 – 10.0 m   (upper two floors)

       FIRST FLOOR WINDOWS   Y=4.5, h=2.0  (3.5–5.5 m) — in brick section
       SECOND FLOOR WINDOWS  Y=5.5, h=1.4  (4.8–6.2 m) — in brick section

       All glass: dark semi-transparent, recessed 0.09 m inside wall face.
       West wall outer face X=4.0   →  glass at X=4.09, frame at X=4.01
       South wall outer face Z=-9.0 →  glass at Z=-9.09, frame at Z=-8.99
  ════════════════════════════════════════════════════════════════════════ -->

         material="src: #pub-diff; normalMap: #pub-norm; roughnessMap: #pub-rough;

  <a-box position="4.09 4.5 -14.25" width="0.1"  height="1.8" depth="1.1"  material="transparent: true; opacity: 0.55; metalness: 0.7; roughness: 0.08; color: #0d1810"></a-box>
  <a-box position="4.05 5.0 -14.25" width="0.12" height="0.1" depth="1.08" color="#2a1f0f"></a-box>

  <a-box position="3.97 3.55 -16.75" width="0.22" height="0.1" depth="1.4" color="#c8b882"></a-box>

  <!-- Window D2  Z=-19.25 -->
  <a-box position="4.01 4.5 -19.25" width="0.16" height="2.0" depth="1.3"  color="#c8b882"></a-box>
  <a-box position="4.09 4.5 -19.25" width="0.1"  height="1.8" depth="1.1"  material="transparent: true; opacity: 0.55; metalness: 0.7; roughness: 0.08; color: #0d1810"></a-box>

  <!-- Green tile base: 0–1 m (unchanged) -->

         material="src: #pub-diff; normalMap: #pub-norm; roughnessMap: #pub-rough;
                   color: #3d7818; repeat: 15 0.5; roughness: 0.15; metalness: 0.08">
