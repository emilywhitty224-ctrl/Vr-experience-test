<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Royal Oak — WWII London, 1940</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- aframe-extras: thumbstick locomotion for Quest controllers -->
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.4.0/dist/aframe-extras.min.js"></script>
  <script>
    AFRAME.registerComponent('blitz-flicker', {
      schema: {
        minIntensity: { default: 0.1 },
        maxIntensity: { default: 1.0 },
        chance:       { default: 0.04 }
      },
      tick: function () {
        if (Math.random() < this.data.chance) {
          const v = this.data.minIntensity +
                    Math.random() * (this.data.maxIntensity - this.data.minIntensity);
          this.el.setAttribute('light', 'intensity', v);
        }
      }
    });

    AFRAME.registerComponent('searchlight-sweep', {
      schema: {
        vertAngle: { default: 15 },
        swing:     { default: 20 },
        speed:     { default: 0.18 }
      },
      init: function () { this.t = 0; },
      tick: function (time, dt) {
        this.t += this.data.speed * (dt / 1000);
        const v = this.data.vertAngle + Math.sin(this.t * 0.6) * 4;
        const p = Math.sin(this.t) * this.data.swing;
        this.el.setAttribute('rotation', `${v.toFixed(2)} ${p.toFixed(2)} 0`);
      }
    });

    // blast-tape: WWII X-pattern across the glass, off-white, 0.02m proud of glass
    AFRAME.registerComponent('blast-tape', {
      schema: { wall: { default: 'west' } },
      init: function () {
        const isWest = this.data.wall === 'west';
        [45, -45].forEach(function (angle) {
          const s = document.createElement('a-box');
          s.setAttribute('color', '#e8e0cc');
          if (isWest) {
            s.setAttribute('position', '0.02 0 0');
            s.setAttribute('rotation', angle + ' 0 0');
            s.setAttribute('width',  '0.025');
            s.setAttribute('height', '2.8');
            s.setAttribute('depth',  '0.05');
          } else {
            s.setAttribute('position', '0 0 -0.02');
            s.setAttribute('rotation', '0 0 ' + angle);
            s.setAttribute('width',  '2.8');
            s.setAttribute('height', '0.05');
            s.setAttribute('depth',  '0.025');
          }
          this.el.appendChild(s);
        }, this);
      }
    });

    // war-window: open frame (4 border strips) + dark glass + glazing bars + blast tape
    // Frame strips leave the centre open so dark glass is visible.
    // Window: 1.7m wide x 2.4m tall. Frame border: 0.12m. Inner opening: 1.46 x 2.16m.
    // West: entity X = wall outer face (4.0). Frame strips at x=-0.05 (protrude outward).
    // South: entity Z = wall outer face (-9.0). Frame strips at z=+0.05 (protrude outward).
    AFRAME.registerComponent('war-window', {
      schema: { wall: { default: 'west' } },
      init: function () {
        const isWest = this.data.wall === 'west';
        const el = this.el;
        function box(pos, w, h, d, col, mat) {
          const b = document.createElement('a-box');
          b.setAttribute('position', pos);
          b.setAttribute('width',  '' + w);
          b.setAttribute('height', '' + h);
          b.setAttribute('depth',  '' + d);
          if (mat) { b.setAttribute('material', mat); }
          else     { b.setAttribute('color', col); }
          el.appendChild(b);
        }
        const fr  = '#0d1a0a';  // dark painted pub frame (near-black green)
        const bar = '#0d1a0a';  // glazing bars — same
        const glm = 'transparent: true; opacity: 0.75; metalness: 0.25; roughness: 0.15; color: #0a1208';

        if (isWest) {
          // ── 4 border strips (frame surround, open centre) ──
          box('-0.05  1.14 0',   0.1, 0.12, 1.7,  fr);   // top
          box('-0.05 -1.14 0',   0.1, 0.12, 1.7,  fr);   // bottom
          box('-0.05  0   -0.79',0.1, 2.4,  0.12, fr);   // left
          box('-0.05  0    0.79',0.1, 2.4,  0.12, fr);   // right
          // ── dark glass panel (recessed slightly behind frame face) ──
          box('0.05 0 0',        0.05, 2.16, 1.46, null, glm);
          // ── glazing bars: 1 vertical + 2 horizontal → 2×3 pane grid ──
          box('0.03  0    0',    0.06, 2.16, 0.06, bar);  // centre vertical
          box('0.03  0.5  0',    0.06, 0.06, 1.46, bar);  // upper horizontal
          box('0.03 -0.5  0',    0.06, 0.06, 1.46, bar);  // lower horizontal
          // ── stone sill ──
          box('-0.1 -1.28 0',    0.22, 0.09, 2.0,  '#b8a870', null);
        } else {
          // ── 4 border strips ──
          box('0   1.14  0.05',  1.7,  0.12, 0.1,  fr);
          box('0  -1.14  0.05',  1.7,  0.12, 0.1,  fr);
          box('-0.79 0   0.05',  0.12, 2.4,  0.1,  fr);
          box(' 0.79 0   0.05',  0.12, 2.4,  0.1,  fr);
          // ── glass ──
          box('0 0 -0.05',       1.46, 2.16, 0.05, null, glm);
          // ── glazing bars ──
          box('0   0   -0.03',   0.06, 2.16, 0.06, bar);
          box('0   0.5 -0.03',   1.46, 0.06, 0.06, bar);
          box('0  -0.5 -0.03',   1.46, 0.06, 0.06, bar);
          // ── sill ──
          box('0 -1.28  0.12',   2.0,  0.09, 0.22, '#b8a870', null);
        }
        el.setAttribute('blast-tape', 'wall: ' + this.data.wall);
      }
    });
  </script>
</head>
<body>
<a-scene
  fog="type: linear; color: #c8d8e8; near: 50; far: 120"
  renderer="colorManagement: true"
  shadow="type: pcfsoft"
  background="color: #6ba3d0">

  <!-- ═══════════════════════ ASSETS ═══════════════════════ -->
  <a-assets timeout="15000">
    <img id="pub-diff"    src="textures/The royal oak/pub_tile_diffuse.jpg">
    <img id="pub-norm"    src="textures/The royal oak/pub_tile_normal.jpg">
    <img id="pub-rough"   src="textures/The royal oak/pub_tile_roughness.jpg">
    <img id="stone-diff"  src="textures/The royal oak/sandstone_diffuse.jpg">
    <img id="stone-ao"    src="textures/The royal oak/sandstone_ao.jpg">
    <img id="stone-rough" src="textures/The royal oak/Sandstone_Rough.jpg">
    <img id="road-diff"   src="textures/The royal oak/street_diffuse.jpg">
    <img id="road-norm"   src="textures/The royal oak/street_normal.jpg">
    <img id="road-rough"  src="textures/The royal oak/street_roughness.jpg">
    <img id="brick-diff"  src="textures/The royal oak/brown_brick_diffuse.jpg">
    <img id="brick-norm"  src="textures/The royal oak/brown_brick_normal.jpg">
    <img id="brick-rough" src="textures/The royal oak/brown_brick_roughness.jpg">
    <img id="brick-ao"    src="textures/The royal oak/brown_brick_ao.jpg">
    <audio id="blitz-snd" src="textures/The royal oak/blitz.mp3" preload="auto"></audio>
    <audio id="vera-snd"  src="textures/The royal oak/vera.mp3"  preload="auto"></audio>
  </a-assets>

  <!-- ═══════════════════════ AUDIO ═══════════════════════ -->
  <a-entity sound="src: #blitz-snd; autoplay: true; loop: true; volume: 0.7; positional: false"></a-entity>
  <a-entity position="5 2 -14"
    sound="src: #vera-snd; autoplay: true; loop: true; volume: 0.5;
           rolloffFactor: 2.5; maxDistance: 18; positional: true">
  </a-entity>

  <!-- ═══════════════════════ DAYTIME LIGHTING ═══════════════════════ -->
  <a-light type="ambient"     color="#d0d8e0" intensity="1.4"></a-light>
  <a-light type="directional" color="#fff8e8" intensity="1.6"
           position="-8 20 5" cast-shadow="true">
  </a-light>

  <!-- ═══════════════════════ STREET ═══════════════════════ -->
  <!-- Single master ground plane — eliminates seams -->
  <a-plane position="9 0.001 -12" rotation="-90 0 0" width="40" height="36"
    material="src: #road-diff; normalMap: #road-norm; roughnessMap: #road-rough;
              repeat: 20 20; roughness: 0.85; metalness: 0">
  </a-plane>

  <!-- ── PAVEMENT ── -->
  <a-plane position="3.4 0.15 -15.5"  rotation="-90 0 0" width="1.2" height="12"
           material="color: #585855; roughness: 0.95; metalness: 0">
  </a-plane>
  <a-plane position="13.0 0.15 -8.4"  rotation="-90 0 0" width="16" height="1.2"
           material="color: #585855; roughness: 0.95; metalness: 0">
  </a-plane>
  <a-plane position="3.9 0.15 -8.65"  rotation="-90 0 0" width="2.2" height="1.7"
           material="color: #585855; roughness: 0.95; metalness: 0">
  </a-plane>

  <!-- ── GRANITE CURB STONES ── -->
  <!-- West kerb — full run from far end to corner -->
  <a-box position="2.8 0.075 -15.5"
         width="0.12" height="0.15" depth="12"
         color="#404040">
  </a-box>
  <!-- West kerb extension — gap between main run and south kerb corner -->
  <a-box position="2.8 0.075 -8.65"
         width="0.12" height="0.15" depth="1.7"
         color="#404040">
  </a-box>
  <!-- South kerb -->
  <a-box position="11.9 0.075 -7.8"
         width="18.2" height="0.15" depth="0.12"
         color="#404040">
  </a-box>
  <!-- Diagonal kerb in front of door bevel -->
  <a-box position="4.588 0.075 -9.588"
         width="0.12" height="0.15" depth="1.3"
         rotation="0 45 0"
         color="#404040">
  </a-box>
  <a-box position="2.8 0.075 -7.8"
         width="0.12" height="0.15" depth="0.12"
         color="#404040">
  </a-box>

  <!-- ═══════════════════════════════════════════════════════════════════════
       THE ROYAL OAK — 10 m TALL, 3-STOREY

       Layer 1  Green tile   0.0 –  1.0 m   (ground floor base)
       Layer 2  Sandstone    1.0 –  3.5 m   (ground floor walls + pub sign)
       Layer 3  Brown brick  3.5 – 10.0 m   (upper two floors)
       Fascia               10.0 – 10.5 m

       ALL WINDOWS  1.7m × 2.4m  (war-window component)
       Ground floor  Y=2.2  (1.0–3.4 m — sandstone section)
       1st floor     Y=5.0  (3.8–6.2 m — brick section)
       2nd floor     Y=7.8  (6.6–9.0 m — brick section)

       West wall outer face X=4.0  — frame offset -0.08 (protrudes out), glass on face
       South wall outer face Z=-9.0 — frame offset +0.08 (protrudes out), glass on face
  ════════════════════════════════════════════════════════════════════════ -->

  <!-- ─── WEST FACADE ─────────────────────────────────────── -->
  <!-- Green tile base: 0–1 m (unchanged) -->
  <a-box position="4.125 0.5 -15.5" width="0.25" height="1.0" depth="11"
         material="src: #pub-diff; normalMap: #pub-norm; roughnessMap: #pub-rough;
                   color: #3d7818; repeat: 11 0.5; roughness: 0.15; metalness: 0.08">
  </a-box>
  <!-- Sandstone: 1–3.5 m (unchanged) -->
  <a-box position="4.125 2.25 -15.5" width="0.25" height="2.5" depth="11"
         material="src: #stone-diff; aoMap: #stone-ao; roughnessMap: #stone-rough;
                   repeat: 5.5 1.5; roughness: 0.88; metalness: 0">
  </a-box>
  <!-- Brown brick: 3.5–10 m -->
  <a-box position="4.125 6.75 -15.5" width="0.25" height="6.5" depth="11"
         material="src: #brick-diff; normalMap: #brick-norm; roughnessMap: #brick-rough; aoMap: #brick-ao; repeat: 6 6.5; roughness: 0.85; metalness: 0">
  </a-box>

  <!-- ── West windows — all 3 floors ── -->
  <a-entity war-window="wall: west" position="4.0 2.2 -11.75"></a-entity>
  <a-entity war-window="wall: west" position="4.0 2.2 -14.25"></a-entity>
  <a-entity war-window="wall: west" position="4.0 2.2 -16.75"></a-entity>
  <a-entity war-window="wall: west" position="4.0 2.2 -19.25"></a-entity>
  <a-entity war-window="wall: west" position="4.0 5.0 -11.75"></a-entity>
  <a-entity war-window="wall: west" position="4.0 5.0 -14.25"></a-entity>
  <a-entity war-window="wall: west" position="4.0 5.0 -16.75"></a-entity>
  <a-entity war-window="wall: west" position="4.0 5.0 -19.25"></a-entity>
  <a-entity war-window="wall: west" position="4.0 7.8 -11.75"></a-entity>
  <a-entity war-window="wall: west" position="4.0 7.8 -14.25"></a-entity>
  <a-entity war-window="wall: west" position="4.0 7.8 -16.75"></a-entity>
  <a-entity war-window="wall: west" position="4.0 7.8 -19.25"></a-entity>

  <!-- ─── SOUTH FACADE ────────────────────────────────────── -->
  <!-- Green tile base: 0–1 m (unchanged) -->
  <a-box position="12.5 0.5 -9.125" width="15" height="1.0" depth="0.25"
         material="src: #pub-diff; normalMap: #pub-norm; roughnessMap: #pub-rough;
                   color: #3d7818; repeat: 15 0.5; roughness: 0.15; metalness: 0.08">
  </a-box>
  <!-- Sandstone: 1–3.5 m (unchanged) -->
  <a-box position="12.5 2.25 -9.125" width="15" height="2.5" depth="0.25"
         material="src: #stone-diff; aoMap: #stone-ao; roughnessMap: #stone-rough;
                   repeat: 7.5 1.5; roughness: 0.88; metalness: 0">
  </a-box>
  <!-- Brown brick: 3.5–10 m -->
  <a-box position="12.5 6.75 -9.125" width="15" height="6.5" depth="0.25"
         material="src: #brick-diff; normalMap: #brick-norm; roughnessMap: #brick-rough; aoMap: #brick-ao; repeat: 6 6.5; roughness: 0.85; metalness: 0">
  </a-box>

  <!-- ── South windows — all 3 floors ── -->
  <a-entity war-window="wall: south" position="7.5 2.2 -9.0"></a-entity>
  <a-entity war-window="wall: south" position="10.5 2.2 -9.0"></a-entity>
  <a-entity war-window="wall: south" position="13.5 2.2 -9.0"></a-entity>
  <a-entity war-window="wall: south" position="17.0 2.2 -9.0"></a-entity>
  <a-entity war-window="wall: south" position="7.5 5.0 -9.0"></a-entity>
  <a-entity war-window="wall: south" position="10.5 5.0 -9.0"></a-entity>
  <a-entity war-window="wall: south" position="13.5 5.0 -9.0"></a-entity>
  <a-entity war-window="wall: south" position="17.0 5.0 -9.0"></a-entity>
  <a-entity war-window="wall: south" position="7.5 7.8 -9.0"></a-entity>
  <a-entity war-window="wall: south" position="10.5 7.8 -9.0"></a-entity>
  <a-entity war-window="wall: south" position="13.5 7.8 -9.0"></a-entity>
  <a-entity war-window="wall: south" position="17.0 7.8 -9.0"></a-entity>

  <!-- ─── 45° BEVEL CORNER ──────────────────────────────────── -->
  <!-- Green tile base: 0–1 m (unchanged) -->
  <a-box position="4.197 0.5 -9.979"  width="0.25" height="1.0" depth="0.307" rotation="0 45 0"
         material="src: #pub-diff; normalMap: #pub-norm; roughnessMap: #pub-rough;
                   color: #3d7818; repeat: 0.3 0.5; roughness: 0.15; metalness: 0.08">
  </a-box>
  <!-- Sandstone: 1–3.5 m (unchanged) -->
  <a-box position="4.197 2.25 -9.979" width="0.25" height="2.5" depth="0.307" rotation="0 45 0"
         material="src: #stone-diff; aoMap: #stone-ao; roughnessMap: #stone-rough;
                   repeat: 0.2 1.5; roughness: 0.88; metalness: 0">
  </a-box>
  <!-- Brown brick: 3.5–10 m -->
  <a-box position="4.197 6.75 -9.979"  width="0.25" height="6.5" depth="0.307" rotation="0 45 0"
         material="src: #brick-diff; normalMap: #brick-norm; roughnessMap: #brick-rough; aoMap: #brick-ao; repeat: 0.3 6.5; roughness: 0.85; metalness: 0">
  </a-box>
  <!-- Green tile base: 0–1 m (unchanged) -->
  <a-box position="4.979 0.5 -9.197"  width="0.25" height="1.0" depth="0.307" rotation="0 45 0"
         material="src: #pub-diff; normalMap: #pub-norm; roughnessMap: #pub-rough;
                   color: #3d7818; repeat: 0.3 0.5; roughness: 0.15; metalness: 0.08">
  </a-box>
  <!-- Sandstone: 1–3.5 m (unchanged) -->
  <a-box position="4.979 2.25 -9.197" width="0.25" height="2.5" depth="0.307" rotation="0 45 0"
         material="src: #stone-diff; aoMap: #stone-ao; roughnessMap: #stone-rough;
                   repeat: 0.2 1.5; roughness: 0.88; metalness: 0">
  </a-box>
  <!-- Brown brick: 3.5–10 m -->
  <a-box position="4.979 6.75 -9.197"  width="0.25" height="6.5" depth="0.307" rotation="0 45 0"
         material="src: #brick-diff; normalMap: #brick-norm; roughnessMap: #brick-rough; aoMap: #brick-ao; repeat: 0.3 6.5; roughness: 0.85; metalness: 0">
  </a-box>
  <!-- Sandstone fill: 1–3.5 m (unchanged) -->
  <a-box position="4.588 2.25 -9.588"  width="0.25" height="2.5" depth="0.82" rotation="0 45 0"
         material="src: #stone-diff; aoMap: #stone-ao; roughnessMap: #stone-rough;
                   repeat: 0.55 1.5; roughness: 0.88; metalness: 0">
  </a-box>
  <!-- Brown brick fill: 3.5–10 m -->
  <a-box position="4.588 6.75 -9.588"  width="0.25" height="6.5" depth="0.82" rotation="0 45 0"
         material="src: #brick-diff; normalMap: #brick-norm; roughnessMap: #brick-rough; aoMap: #brick-ao; repeat: 0.3 6.5; roughness: 0.85; metalness: 0">
  </a-box>

  <!-- ─── DOUBLE DOORS ─────────────────────────────────────── -->
  <a-box position="4.588 1.6 -9.588"  width="0.08" height="3.2" depth="0.92" rotation="0 45 0" color="#1e140a"></a-box>
  <a-box position="4.394 1.45 -9.960" width="0.44" height="2.9" depth="0.09" rotation="0 45 0" color="#1e4c10"></a-box>
  <a-box position="4.960 1.45 -9.394" width="0.44" height="2.9" depth="0.09" rotation="0 45 0" color="#1e4c10"></a-box>
  <a-box position="4.588 1.45 -9.588" width="0.05" height="2.9" depth="0.13" rotation="0 45 0" color="#16100a"></a-box>
  <a-box position="4.394 2.1 -9.960"  width="0.44" height="0.07" depth="0.13" rotation="0 45 0" color="#16100a"></a-box>
  <a-box position="4.960 2.1 -9.394"  width="0.44" height="0.07" depth="0.13" rotation="0 45 0" color="#16100a"></a-box>
  <a-box position="4.588 2.93 -9.588" width="0.90" height="0.07" depth="0.13" rotation="0 45 0" color="#16100a"></a-box>
  <a-box position="4.588 3.25 -9.588" width="0.84" height="0.57" depth="0.08" rotation="0 45 0"
         material="transparent: true; opacity: 0.4; metalness: 0.6; roughness: 0.05; color: #88aacc"></a-box>
  <a-box position="4.394 2.5 -9.960"  width="0.28" height="0.60" depth="0.12" rotation="0 45 0" color="#163c0c"></a-box>
  <a-box position="4.394 1.15 -9.960" width="0.28" height="1.70" depth="0.12" rotation="0 45 0" color="#163c0c"></a-box>
  <a-box position="4.960 2.5 -9.394"  width="0.28" height="0.60" depth="0.12" rotation="0 45 0" color="#163c0c"></a-box>
  <a-box position="4.960 1.15 -9.394" width="0.28" height="1.70" depth="0.12" rotation="0 45 0" color="#163c0c"></a-box>
  <a-box position="4.566 1.45 -9.610" width="0.04" height="0.14" depth="0.10" rotation="0 45 0" color="#c8a018"></a-box>
  <a-box position="4.610 1.45 -9.566" width="0.04" height="0.14" depth="0.10" rotation="0 45 0" color="#c8a018"></a-box>
  <a-box position="4.394 0.30 -9.960" width="0.44" height="0.22" depth="0.11" rotation="0 45 0" color="#a08010"></a-box>
  <a-box position="4.960 0.30 -9.394" width="0.44" height="0.22" depth="0.11" rotation="0 45 0" color="#a08010"></a-box>
  <a-box position="4.5 0.20 -9.5"     width="0.60" height="0.10" depth="0.88" rotation="0 45 0" color="#3a3028"></a-box>

  <!-- ─── ROOFLINE FASCIA (10.0–10.5 m) ──────────────────────── -->
  <a-box position="3.975 10.25 -15.5"  width="0.5" height="0.5" depth="11.5"
         material="src: #stone-diff; aoMap: #stone-ao; roughnessMap: #stone-rough;
                   repeat: 5.5 0.3; roughness: 0.85; metalness: 0">
  </a-box>
  <a-box position="12.5 10.25 -8.975"  width="15.5" height="0.5" depth="0.5"
         material="src: #stone-diff; aoMap: #stone-ao; roughnessMap: #stone-rough;
                   repeat: 7.5 0.3; roughness: 0.85; metalness: 0">
  </a-box>
  <a-box position="4.588 10.25 -9.588" width="0.5" height="0.5" depth="1.5" rotation="0 45 0"
         material="src: #stone-diff; aoMap: #stone-ao; roughnessMap: #stone-rough;
                   repeat: 1 0.3; roughness: 0.85; metalness: 0">
  </a-box>

  <!-- ─── PUB SIGN ─── -->
  <a-text value="THE ROYAL OAK"
          position="3.74 3.4 -15.5"
          rotation="0 -90 0"
          color="#1a1408"
          width="11"
          align="center"
          letter-spacing="2">
  </a-text>
  <a-text value="THE ROYAL OAK"
          position="12.5 3.4 -8.84"
          rotation="0 180 0"
          color="#1a1408"
          width="15"
          align="center"
          letter-spacing="2">
  </a-text>

  <!-- ─── BUILDING SHELL ────────────────────────────────────── -->
  <a-box position="12.5 5 -21.25"   width="16"    height="10"  depth="0.25" color="#1a1a18"></a-box>
